name: Publish to GitHub Packages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    # Skip runs triggered by the version bump commit
    if: "!startsWith(github.event.head_commit.message, 'chore: bump version')"
    uses: ./.github/workflows/ci.yml

  publish:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          registry-url: https://npm.pkg.github.com

      - run: pnpm install --frozen-lockfile
      - run: pnpm build

      - name: Generate release notes
        run: |
          LAST_BUMP=$(git log --format=%H --grep="^chore: bump version" -1)
          if [ -n "$LAST_BUMP" ]; then
            git log ${LAST_BUMP}..HEAD \
              --format='%h%x09%s' \
              --no-merges \
              --invert-grep --grep="^chore:" --grep="^Updated docs" \
            | jq -R -s '[split("\n")[] | select(length > 0) | split("\t") | {hash: .[0], message: .[1:] | join("\t")}]' > release-notes.json
          else
            echo '[]' > release-notes.json
          fi

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump patch version past any published version
        run: |
          LOCAL_VERSION=$(node -p "require('./package.json').version")
          # Get the latest version from the registry (returns empty if none published)
          PUBLISHED=$(npm view @roylet-gs/agent-monitor version 2>/dev/null || echo "0.0.0")
          echo "Local: $LOCAL_VERSION, Published: $PUBLISHED"
          # Bump once from local
          npm version patch --no-git-tag-version
          NEW_VERSION=$(node -p "require('./package.json').version")
          # If the bumped version is still <= published, set version to published and bump again
          if npx semver "$NEW_VERSION" -r "<=$PUBLISHED" > /dev/null 2>&1; then
            echo "Bumped version $NEW_VERSION already exists, bumping past $PUBLISHED"
            npm version "$PUBLISHED" --no-git-tag-version --allow-same-version
            npm version patch --no-git-tag-version
            NEW_VERSION=$(node -p "require('./package.json').version")
          fi
          echo "Will publish: $NEW_VERSION"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to GitHub Packages
        run: pnpm publish --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Push version bump
        run: |
          git add package.json
          VERSION=$(node -p "require('./package.json').version")
          git commit -m "chore: bump version to $VERSION"
          git push
